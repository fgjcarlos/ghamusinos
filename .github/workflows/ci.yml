name: CI

on:
  push:
    branches: [main]
  pull_request:

# Permisos mínimos a nivel de workflow (hardening supply-chain)
permissions:
  contents: read

# El entorno de desarrollo usa Go 1.22 y no descarga otras toolchains.
# Lo fijamos también en CI para que las dependencias no fuercen un upgrade.
env:
  GOTOOLCHAIN: local

jobs:
  backend:
    name: Backend (lint + test + build + migrate)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ghamusinos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.22"
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Ficheros sin formatear:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build -o bin/ghamusinos ./cmd/ghamusinos

      - name: migraciones (smoke)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ghamusinos?sslmode=disable
        run: |
          go run ./cmd/migrate up
          go run ./cmd/migrate status

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: install
        run: pnpm --dir web install --frozen-lockfile

      - name: build
        run: pnpm --dir web build
