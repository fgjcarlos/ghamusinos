name: CI

on:
  push:
    branches: [main]
  pull_request:

# Permisos mínimos a nivel de workflow (hardening supply-chain).
# Cualquier job que necesite más (p.ej. release) lo sobreescribe localmente.
permissions:
  contents: read

# El entorno de desarrollo usa Go 1.22 y no descarga otras toolchains.
# Lo fijamos también en CI para que las dependencias no fuercen un upgrade.
env:
  GOTOOLCHAIN: local

jobs:
  backend:
    name: Backend (lint + test + build + migrate)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ghamusinos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      # Acciones pineadas a SHA completo con comentario de versión (hardening
      # supply-chain). Para actualizarlas: bump del SHA, abrir PR, mergear.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.22"
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Ficheros sin formatear:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build -o bin/ghamusinos ./cmd/ghamusinos

      - name: migraciones (smoke)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ghamusinos?sslmode=disable
        run: |
          go run ./cmd/migrate up
          go run ./cmd/migrate status

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: install
        run: pnpm --dir web install --frozen-lockfile

      - name: build
        run: pnpm --dir web build
