version: 2

# Test files contain JWT-shaped fixtures (intentionally fake tokens with
# kid="test-key-1" and signature="fake-signature") and placeholder
# database URLs. These are NOT real secrets - they're structured test
# inputs for the auth middleware and JWT validator.
#
# Without this config, GitGuardian's PR scan flags every JWT-shaped
# string in *_test.go as a potential leaked credential.
ignored_paths:
  - "**/*_test.go"
  - "**/testhelpers_test.go"
  - "**/testdata/**"

ignored_matches:
  - name: Test JWT fixtures
    paths:
      - "**/*_test.go"
    matches:
      - type: jwt
  - name: Test postgres URLs
    paths:
      - "**/*_test.go"
    matches:
      - type: postgres_uri
