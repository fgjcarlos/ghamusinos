services:
  db:
    image: timescale/timescaledb:2.27.2-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ghamusinos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ghamusinos}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ghamusinos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ghamusinos} -d ${POSTGRES_DB:-ghamusinos}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  ghamusinos_pgdata:
