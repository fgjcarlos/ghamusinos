version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/db/schema.sql"
    queries: "internal/db/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        overrides:
          # users.invite_status → status.InviteStatus
          - column: "users.invite_status"
            go_type:
              import: "github.com/fgjcarlos/ghamusinos/internal/db/status"
              type: "InviteStatus"
          # invites.status → status.Status
          - column: "invites.status"
            go_type:
              import: "github.com/fgjcarlos/ghamusinos/internal/db/status"
              type: "Status"
          # invites.token_hash → no serializar en JSON
          - column: "invites.token_hash"
            go_type: "string"
            go_struct_tag: 'json:"-"'
