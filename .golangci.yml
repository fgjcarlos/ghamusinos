# Configuración de golangci-lint para ghamusinos.
# Versión objetivo: v2.x (alineada con la CI).
# Docs: https://golangci-lint.run/product/configuration-v2/
#
# Conjunto de linters v2 activo (issue #24, ampliado en #62):
#   - govet: sustituye al paso `go vet` previo.
#   - noctx: protege contra http.Get/Post/etc. sin context.Context.
#   - errcheck: detecta errores ignorados; `check-blank: false` permite
#     descartar errores explícitamente con `_ = ...` (lo pide #62).
#     Endurecer a `check-blank: true` está trackeado en issue de
#     seguimiento abierta desde #62.
#   - staticcheck: bugs sutiles y código sospechoso (categorías
#     `SA*`, `ST*`, `S1xxx`). El código actual pasa con 0 hallazgos.
#   - exhaustive: fuerza a listar todos los casos en `switch` sobre
#     tipos enumerados. El código actual pasa con 0 hallazgos.

version: "2"

linters:
  default: none
  enable:
    - govet
    - noctx
    - errcheck
    - staticcheck
    - exhaustive
  settings:
    errcheck:
      # `check-blank: false` ignora asignaciones a `_` (p.ej.
      # `_ = conn.Close()` en defer). Es la postura que #62 fija;
      # endurecer a `true` queda como follow-up.
      check-blank: false

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
