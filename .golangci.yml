# Configuración de golangci-lint para ghamusinos.
# Versión objetivo: v2.x (alineada con la CI).
# Docs: https://golangci-lint.run/product/configuration-v2/
#
# Esta configuración activa SOLO los linters cuyo coste/beneficio compensa
# en el estado actual del código. El conjunto completo que la issue #24
# describe (errcheck, staticcheck, exhaustive) está trackeado en #61 y se
# activará en un PR dedicado tras arreglar los hallazgos pre-existentes.

version: "2"

linters:
  default: none
  enable:
    # govet sustituye al paso `go vet` previo. No genera hallazgos nuevos
    # en código que ya pasaba el pipeline v1.
    - govet
    # noctx protege contra http.Get/Post/etc. sin context.Context. La
    # migración a testGet en los tests del router (#33) introduce el
    # helper para satisfacer este linter.
    - noctx

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
